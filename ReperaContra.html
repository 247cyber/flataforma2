<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="estilos/global.css">

<body>

    <div class="pantalla-fondo">
        <div class="cuadro-recuperar">
            
            <div class="recuperar-header">
                <a href="Login.html"><img src="imagenes/logo.png" alt="EasyMatric" class="logo-easymatric"></a>
                <div class="icono-seguridad">
                    <i class="bi bi-shield-lock-fill"></i>

            </form>

            <div class="pie-cuadro">
